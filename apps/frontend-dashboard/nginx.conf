server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip_static on;

    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}