openapi: 3.0.0
info:
  title: Resume Intelligence Hub API
  version: 1.0.0
  description: API Gateway for the Resume Processing and Matching System
servers:
  - url: http://localhost:3000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                username:
                  type: string
                email:
                  type: string
            token:
              type: string
              
    ResumeResponse:
        type: object
        properties:
          id:
            type: string
          minioPath:
            type: string
          status:
            type: string
          createdAt:
            type: string
            format: date-time

    JobResponse:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            requiredSkills:
              type: array
              items:
                type: string
            createdAt:
              type: string
              format: date-time

    MatchResponse:
          type: object
          properties:
            id:
              type: string
            resumeId:
              type: string
            jobId:
              type: string
            score:
              type: integer
              example: 60
            details:
              type: object
              properties:
                matchedSkills:
                  type: array
                  items:
                    type: string
                missingSkills:
                  type: array
                  items:
                    type: string

    jobRole:
          type: object
          properties:
            id:
              type: string
            title:
              type: string
            isActive:
              type: boolean
          createdAt:
            type: string
            format: date-time

    DashboardResponse:
          type: object
          properties:
            totalResumes:
              type: integer
              example: 12
            topSkills:
              type: array
              items:
                type: object
                properties:
                  skill:
                    type: string
                    example: React
                  count:
                    type: integer
                    example: 8
            topUniversities:
              type: array
              items:
                type: object
                properties:
                  university:
                    type: string
                    example: Silicon University
                  count:
                    type: integer
                    example: 3
            matchAverages:
              type: array
              items:
                type: object
                properties:
                  jobTitle:
                    type: string
                    example: iOS Engineer
                  averageScore:
                    type: number
                    example: 75.5
            updatedAt:
              type: string
              format: date-time
              nullable: true

paths:
  /health:
    get:
      summary: Health Check
      responses:
        '200':
          description: Server is operational

  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  example: jdoe
                email:
                  type: string
                  example: jdoe@example.com
                password:
                  type: string
                  example: securepassword123
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation Error
        '409':
          description: Conflict (Email or Username taken)

  /api/auth/login:
    post:
      summary: Login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: jdoe@example.com
                password:
                  type: string
                  example: securepassword123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /api/resumes:
      post:
        summary: Register an uploaded resume
        tags:
          - Resumes
        security:
          - bearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - minioPath
                properties:
                  minioPath:
                    type: string
                    example: files/8f7d9b...pdf
        responses:
          '201':
            description: Resume registered
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      $ref: '#/components/schemas/ResumeResponse'
          '401':
            description: Unauthorized
          '400':
            description: Validation Error

      get:
        summary: Get all resumes for current user
        tags:
          - Resumes
        security:
          - bearerAuth: []
        responses:
          '200':
            description: List of resumes
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ResumeResponse'
          '401':
            description: Unauthorized

  /api/resumes/{id}:
    get:
      summary: Get a specific resume
      tags:
        - Resumes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resume details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/ResumeResponse'
        '404':
          description: Resume not found or access denied
        '401':
          description: Unauthorized

  /api/resumes/{id}/matches:
      get:
        summary: Get all job matches for a specific resume
        tags:
          - Resumes
        security:
          - bearerAuth: []
        parameters:
          - in: path
            name: id
            required: true
            schema:
              type: string
        responses:
          '200':
            description: List of matches scored against active jobs
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/MatchResponse'
          '404':
            description: Resume not found or access denied
          '401':
            description: Unauthorized 

  /api/jobs:
      post:
        summary: Create a target job role
        tags:
          - Jobs
        security:
          - bearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - title
                  - requiredSkills
                properties:
                  title:
                    type: string
                    example: Senior Fullstack Engineer
                  requiredSkills:
                    type: array
                    items:
                      type: string
                    example: ["Node.js", "React", "TypeScript", "PostgreSQL"]
        responses:
          '201':
            description: Job created
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      $ref: '#/components/schemas/JobResponse'
          '401':
            description: Unauthorized
          '400':
            description: Validation Error

      get:
        summary: Get all jobs for current user
        tags:
          - Jobs
        security:
          - bearerAuth: []
        responses:
          '200':
            description: List of jobs
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/JobResponse'

  /api/jobs/{id}:
    get:
      summary: Get a specific job
      tags:
        - Jobs
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/JobResponse'
        '404':
          description: Job not found or access denied