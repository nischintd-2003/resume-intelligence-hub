openapi: 3.0.0
info:
  title: Resume Intelligence Hub API
  version: 1.0.0
  description: API Gateway for the Resume Processing and Matching System
servers:
  - url: http://localhost:3000
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            user:
              type: object
              properties:
                id:
                  type: string
                username:
                  type: string
                email:
                  type: string
            token:
              type: string
    ResumeResponse:
        type: object
        properties:
          id:
            type: string
          minioPath:
            type: string
          status:
            type: string
          createdAt:
            type: string
            format: date-time              

paths:
  /health:
    get:
      summary: Health Check
      responses:
        '200':
          description: Server is operational

  /api/auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  example: jdoe
                email:
                  type: string
                  example: jdoe@example.com
                password:
                  type: string
                  example: securepassword123
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation Error
        '409':
          description: Conflict (Email or Username taken)

  /api/auth/login:
    post:
      summary: Login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: jdoe@example.com
                password:
                  type: string
                  example: securepassword123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials

  /api/resumes:
      post:
        summary: Register an uploaded resume
        tags:
          - Resumes
        security:
          - bearerAuth: []
        requestBody:
          required: true
          content:
            application/json:
              schema:
                type: object
                required:
                  - minioPath
                properties:
                  minioPath:
                    type: string
                    example: files/8f7d9b...pdf
        responses:
          '201':
            description: Resume registered
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      $ref: '#/components/schemas/ResumeResponse'
          '401':
            description: Unauthorized
          '400':
            description: Validation Error

      get:
        summary: Get all resumes for current user
        tags:
          - Resumes
        security:
          - bearerAuth: []
        responses:
          '200':
            description: List of resumes
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    status:
                      type: string
                      example: success
                    data:
                      type: array
                      items:
                        $ref: '#/components/schemas/ResumeResponse'
          '401':
            description: Unauthorized

  /api/resumes/{id}:
    get:
      summary: Get a specific resume
      tags:
        - Resumes
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resume details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/ResumeResponse'
        '404':
          description: Resume not found or access denied
        '401':
          description: Unauthorized