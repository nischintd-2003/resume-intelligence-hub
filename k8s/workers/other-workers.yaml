# WORKER-NLP 
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-nlp
  namespace: resume-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-nlp
  template:
    metadata:
      labels:
        app: worker-nlp
    spec:
      containers:
        - name: worker-nlp
          image: resume-hub/worker-nlp:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: resume-hub-config
            - secretRef:
                name: resume-hub-secret
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

